name: Translate

# Checks all managed repos for missing translations and creates per-language PRs.
on:
  schedule:
    - cron: "0 * * * *" # hourly — precheck skips if nothing is missing
  workflow_dispatch:
    inputs:
      target_repo:
        description: "Specific repo (owner/name), or blank for all"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: translate
  cancel-in-progress: false

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.list.outputs.repos }}
      bot_org: ${{ steps.list.outputs.bot_org }}
      bot_user: ${{ steps.list.outputs.bot_user }}
      bot_email: ${{ steps.list.outputs.bot_email }}
    steps:
      - uses: actions/checkout@v4

      - name: Build repo matrix
        id: list
        run: bash scripts/parse-config.sh "${{ inputs.target_repo }}"

  precheck:
    needs: matrix
    if: needs.matrix.outputs.repos != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: ${{ fromJson(needs.matrix.outputs.repos) }}
      fail-fast: false
    outputs:
      # JSON map of repo → needs_run (consumed by translate job)
      results: ${{ steps.collect.outputs.results }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ matrix.repo.repo }}
          path: target

      - name: Check for missing translations
        id: check
        working-directory: target
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
          LOCALES_PATH: ${{ matrix.repo.locales_path }}
          SOURCE_LANGUAGE: ${{ matrix.repo.source_language }}
          FILE_FORMAT: ${{ matrix.repo.file_format }}
          REPO: ${{ matrix.repo.repo }}
          BOT_USER: ${{ needs.matrix.outputs.bot_user }}
          BRANCH_PREFIX: ${{ matrix.repo.branch_prefix }}
        run: |
          set -euo pipefail
          needs_run=false

          # Get open PR branches from the bot to skip those languages
          open_branches=$(gh pr list --repo "$REPO" --state open --author "$BOT_USER" \
            --json headRefName --jq '.[].headRefName' 2>/dev/null || true)

          case "$FILE_FORMAT" in
            po)
              for f in "$LOCALES_PATH"/*.po; do
                [ -f "$f" ] || continue
                lang=$(basename "$f" .po)
                [ "$lang" = "$SOURCE_LANGUAGE" ] && continue
                # Skip if there's already an open PR for this language
                if echo "$open_branches" | grep -qx "${BRANCH_PREFIX}-${lang}"; then
                  continue
                fi
                # Check for empty msgstr (skip header entry)
                if awk '/^msgid ""$/{skip=1;next}/^msgid /{skip=0}{if(!skip)print}' "$f" \
                    | grep -q '^msgstr ""$'; then
                  needs_run=true
                  break
                fi
              done
              ;;
            json)
              src="$LOCALES_PATH/${SOURCE_LANGUAGE}.json"
              [ -f "$src" ] || { echo "No source file found"; exit 0; }
              src_keys=$(jq -r 'keys[]' "$src" | sort)
              for f in "$LOCALES_PATH"/*.json; do
                [ -f "$f" ] || continue
                lang=$(basename "$f" .json)
                [ "$lang" = "$SOURCE_LANGUAGE" ] && continue
                if echo "$open_branches" | grep -qx "${BRANCH_PREFIX}-${lang}"; then
                  continue
                fi
                # Check for missing or empty keys
                file_keys=$(jq -r 'to_entries[] | select(.value == "" or .value == null) | .key' "$f")
                missing=$(comm -23 <(echo "$src_keys") <(jq -r 'keys[]' "$f" | sort))
                if [ -n "$file_keys" ] || [ -n "$missing" ]; then
                  needs_run=true
                  break
                fi
              done
              ;;
            *)
              # For other formats, always run Claude (it will detect what's needed)
              needs_run=true
              ;;
          esac

          echo "needs_run=$needs_run" >> "$GITHUB_OUTPUT"
          echo "${{ matrix.repo.repo }}: needs_run=$needs_run"

      - name: Collect result
        id: collect
        run: |
          echo "result={\"repo\":\"${{ matrix.repo.repo }}\",\"needs_run\":${{ steps.check.outputs.needs_run }}}" >> "$GITHUB_OUTPUT"

  translate:
    needs: [matrix, precheck]
    if: needs.matrix.outputs.repos != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: ${{ fromJson(needs.matrix.outputs.repos) }}
      max-parallel: 2
      fail-fast: false
    steps:
      # Skip if precheck determined nothing to do.
      # workflow_dispatch always runs (force mode).
      - name: Check if needed
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          elif [ "${{ needs.precheck.result }}" != "success" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=${{ steps.check.outputs.needs_run == 'false' }}" >> "$GITHUB_OUTPUT"
          fi

      # Checkout orchestrator (for prompts, rules)
      - uses: actions/checkout@v4
        if: steps.gate.outputs.skip != 'true'
        with:
          path: orchestrator

      # Checkout target repo
      - uses: actions/checkout@v4
        if: steps.gate.outputs.skip != 'true'
        with:
          repository: ${{ matrix.repo.repo }}
          path: target
          fetch-depth: 0
          token: ${{ secrets.BOT_PAT }}

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.skip != 'true'
        with:
          node-version: ${{ matrix.repo.node_version || '20' }}

      # Install target repo dependencies
      - name: Setup target repo
        if: steps.gate.outputs.skip != 'true' && matrix.repo.setup != ''
        working-directory: target
        run: ${{ matrix.repo.setup }}

      - name: Install Claude Code CLI
        if: steps.gate.outputs.skip != 'true'
        run: npm install -g @anthropic-ai/claude-code@2.1.116

      - name: Configure git and fork remote
        if: steps.gate.outputs.skip != 'true'
        working-directory: target
        env:
          BOT_PAT: ${{ secrets.BOT_PAT }}
        run: |
          git config user.name "${{ needs.matrix.outputs.bot_user }}"
          git config user.email "${{ needs.matrix.outputs.bot_email }}"
          git remote add fork "https://x-access-token:${BOT_PAT}@github.com/${{ matrix.repo.fork }}.git"
          git fetch fork

      - name: Sync fork
        if: steps.gate.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: |
          gh repo sync "${{ matrix.repo.fork }}" \
            --source "${{ matrix.repo.repo }}" --force 2>/dev/null || true

      - name: Snapshot branch refs
        if: steps.gate.outputs.skip != 'true'
        working-directory: target
        run: |
          git for-each-ref --format='%(refname:short)=%(objectname)' refs/heads/ \
            > "$RUNNER_TEMP/pre-refs.txt"

      - name: Run Claude
        if: steps.gate.outputs.skip != 'true'
        working-directory: target
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.BOT_PAT }}
          ORCHESTRATOR_DIR: ${{ github.workspace }}/orchestrator
          TARGET_REPO: ${{ matrix.repo.repo }}
          BOT_ORG: ${{ needs.matrix.outputs.bot_org }}
          BOT_USER: ${{ needs.matrix.outputs.bot_user }}
          FORK_REPO: ${{ matrix.repo.fork }}
          LOCALES_PATH: ${{ matrix.repo.locales_path }}
          FILE_FORMAT: ${{ matrix.repo.file_format }}
          SOURCE_LANGUAGE: ${{ matrix.repo.source_language }}
          FRAMEWORK: ${{ matrix.repo.framework }}
          EXTRACT_CMD: ${{ matrix.repo.extract }}
          FORMAT_CMD: ${{ matrix.repo.format }}
          BRANCH_PREFIX: ${{ matrix.repo.branch_prefix }}
          PR_TITLE_PREFIX: ${{ matrix.repo.pr_title_prefix }}
          DEFAULT_REVIEWERS: ${{ matrix.repo.default_reviewers }}
          LANGUAGE_REVIEWERS: ${{ matrix.repo.language_reviewers }}
        run: |
          prompt=$(envsubst < "$ORCHESTRATOR_DIR/prompts/check.md")
          claude -p "$prompt" \
            --dangerously-skip-permissions \
            --allowedTools "Bash(git:*),Bash(gh pr:*),Bash(gh api repos/${{ matrix.repo.repo }}/:*),Bash(gh api graphql:*),Bash(npm:*),Bash(yarn:*),Bash(pnpm:*),Bash(awk:*),Bash(grep:*),Bash(sed:*),Bash(cat:*),Bash(basename:*),Bash(echo:*),Bash(jq:*),Bash(wc:*),Bash(head:*),Bash(tail:*),Bash(date:*),Bash(find:*),Bash(ls:*),Bash(mkdir:*),Bash(cd:*),Bash(envsubst:*),Bash(printf:*),Bash(sort:*),Bash(uniq:*),Bash(tr:*),Read,Write,Edit,Glob,Grep,Agent"

      - name: Audit Claude changes
        if: always() && steps.gate.outputs.skip != 'true'
        working-directory: target
        run: |
          set -euo pipefail
          violations=()
          while IFS='=' read -r ref sha; do
            pre_sha=$(grep "^${ref}=" "$RUNNER_TEMP/pre-refs.txt" 2>/dev/null | cut -d= -f2 || true)
            if [ -z "$pre_sha" ]; then
              base="origin/main"
            elif [ "$pre_sha" != "$sha" ]; then
              base="$pre_sha"
            else
              continue
            fi
            files=$(git diff --name-only "$base..$sha" 2>/dev/null || true)
            [ -z "$files" ] && continue
            while IFS= read -r f; do
              # Allow only translation files within the locales path
              case "$f" in
                ${{ matrix.repo.locales_path }}/*) ;;
                *) violations+=("$ref: $f") ;;
              esac
            done <<< "$files"
          done < <(git for-each-ref --format='%(refname:short)=%(objectname)' refs/heads/)

          if [ ${#violations[@]} -gt 0 ]; then
            echo "::error::Claude modified files outside the locales path:"
            printf '  %s\n' "${violations[@]}"
            exit 1
          fi
          echo "Audit passed — all changed files are within the allowed path set."
